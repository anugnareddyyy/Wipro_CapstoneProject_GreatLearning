# ===================================================================
# AppVerse AI - Application Configuration
# ===================================================================

spring.application.name=appverse-backend

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/appverse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=anu.!!aa1O11
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
app.jwt.secret=AppVerseAISecretKey2024VeryLongSecretKeyForHMACSHA256AlgorithmSecurity
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.com.appverse=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/appverse.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================================
# SPRINGDOC / SWAGGER CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/apps

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
app.cors.allowed-origins=http://localhost:3000

